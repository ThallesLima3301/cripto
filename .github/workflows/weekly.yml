# Weekly summary: generate report, persist to DB, send via ntfy.
#
# Runs Sunday at 12:00 UTC (09:00 BRT). The summary covers a
# rolling 7-day window of signals, buys, and matured evaluations.

name: weekly

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-state
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: state
          path: .state
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
        run: bash scripts/gha_state.sh pull

      - name: Weekly summary
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python -m crypto_monitor.cli weekly

      - name: Push state
        env:
          STATE_ENCRYPTION_KEY: ${{ secrets.STATE_ENCRYPTION_KEY }}
        run: bash scripts/gha_state.sh push
